<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLCP</title>

<style>

{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
}

/ HEADER /

.site-header{
background:#000;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.header-container{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 20px;
}

.header-logo{
height:70px;
}

.main-nav a{
color:white;
text-decoration:none;
margin:0 14px;
font-weight:600;
}

.register-header{
background:#e11b22;
padding:10px 18px;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:bold;
}

/ HERO VIDEO /

.hero{
width:100%;
overflow:hidden;
background:black;
}

.hero video{
width:100%;
max-width:900px;
margin:auto;
display:block;
border-radius:12px;
}

/ CONTENT /

.container{
max-width:1100px;
margin:auto;
padding:50px 20px;
text-align:center;
}

.section{
margin-bottom:50px;
}

.section h2{
margin-bottom:20px;
font-size:1.6rem;
}

/ EVENT FLYER /

.flyer{
width:100px;
max-width:90%;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
display:block;
margin:auto;
}

/ REGISTER BUTTON /

.register-btn{
display:inline-block;
padding:14px 26px;
background:white;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:10px;
}

/ SOCIAL ICONS /

.socials{
display:flex;
justify-content:center;
gap:24px;
margin-top:20px;
}

.social-icon{
width:44px;
height:44px;
transition:transform .2s;
}

.social-icon:hover{
transform:scale(1.15);
}

/ FOOTER */

footer{
text-align:center;
padding:30px;
color:#999;
font-size:.9rem;
}

@media(max-width:768px){

.header-container{
flex-direction:column;
gap:10px;
}

.main-nav{
margin-top:10px;
}

.main-nav a{
margin:0 8px;
}

}

</style>
</head>

<header class="site-header">

<div class="header-container">
